services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: legacy_architect_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: legacy_architect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d legacy_architect']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
